<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web QR Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root {
            --primary: #2563eb;
            --dark: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 { color: var(--dark); text-align: center; margin-bottom: 20px; }

        /* Scanner Styling */
        #reader {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            border: none !important; /* Removes library default border */
        }

        /* Form Styling */
        .form-group {
            margin-top: 25px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            background-color: #f1f5f9;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: #1d4ed8; }

        #status {
            margin-top: 10px;
            text-align: center;
            font-size: 0.875rem;
            color: #10b981;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>QR Data Entry</h2>
        
        <div id="reader"></div>

        <div class="form-group">
            <label for="scanned-result">Scanned Content</label>
            <input type="text" id="scanned-result" placeholder="Scan a code to fill..." readonly>
            
            <button onclick="handleSubmit()">Save Data</button>
            <p id="status"></p>
        </div>
    </div>

    <script>
        // Initialize the Scanner
        const html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 15, 
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0 
            }
        );

        // What happens when a QR is found
        function onScanSuccess(decodedText, decodedResult) {
            // Fill the input field
            document.getElementById('scanned-result').value = decodedText;
            
            // Visual feedback
            document.getElementById('status').innerText = "? Code Scanned Successfully!";
            document.getElementById('status').style.color = "#10b981";

            // Optional: Stop scanning after one success
            // html5QrcodeScanner.clear();
        }

        function onScanFailure(error) {
            // We ignore scan failures (usually just "no QR found in frame")
        }

        // Start the scanner
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);

        // Handle the button click
        function handleSubmit() {
            const data = document.getElementById('scanned-result').value;
            if (data) {
                alert("Data to be saved: " + data);
                // Here you would typically send 'data' to a database
            } else {
                alert("Please scan a QR code first!");
            }
        }
    </script>

</body>
</html>
