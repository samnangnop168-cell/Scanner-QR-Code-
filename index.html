<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Production Cloud Tracker</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 450px; box-sizing: border-box; }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; background: #000; margin-bottom: 15px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full { grid-column: span 2; }
        .group { display: flex; flex-direction: column; }
        label { font-size: 0.75rem; font-weight: bold; color: #64748b; margin-bottom: 4px; text-transform: uppercase; }
        input { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; background: #f1f5f9; color: #1e293b; }
        #qty-input { border: 2px solid var(--primary); background: #ffffff; }

        .btn-submit { background: var(--primary); color: white; width: 100%; padding: 16px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .btn-submit:disabled { background: #94a3b8; }
        
        .status { text-align: center; height: 25px; font-weight: bold; margin-bottom: 10px; font-size: 0.9rem; }
        
        .history { width: 100%; max-width: 450px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; font-size: 0.8rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #f1f5f9; }
        th { background: #f1f5f9; color: #64748b; }
    </style>
</head>
<body>

    <div class="card">
        <h3 style="margin: 0 0 15px 0; text-align: center;">Production Cloud Logger</h3>
        <div id="status" class="status"></div>
        
        <div id="reader"></div>

        <div class="form-grid">
            <div class="group full">
                <label>Model Name</label>
                <input type="text" id="model-name" readonly placeholder="Waiting for scan...">
            </div>
            <div class="group">
                <label>Side</label>
                <input type="text" id="side-id" readonly>
            </div>
            <div class="group">
                <label>Location ID</label>
                <input type="text" id="location-id" readonly>
            </div>
            <div class="group full">
                <label>Box No.</label>
                <input type="text" id="box-no" readonly>
            </div>
            <div class="group full">
                <label style="color: var(--primary);">Quantity (Manual Input)</label>
                <input type="number" id="qty-input" placeholder="Enter amount...">
            </div>
        </div>

        <button class="btn-submit" id="submit-btn" onclick="submitData()">SUBMIT TO CLOUD</button>
    </div>

    <div class="history">
        <h4 style="margin: 10px 0;">Live History (Google Sheet Sync)</h4>
        <table>
            <thead>
                <tr>
                    <th>Model</th>
                    <th>Loc</th>
                    <th>Box</th>
                    <th>Q'ty</th>
                </tr>
            </thead>
            <tbody id="history-body">
                <tr><td colspan="4" style="text-align:center;">Loading history...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // FIXED: Added quotation marks around the URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyTS_u1R6LPgQqfSYpOmuyIZUJrj6Ow9DNA6b0U6HhbBqVeYP1F6_oWcWG3KsVn8x3Kmw/exec";

        let lastCode = "";

        // Initial load of history from Google Sheets
        window.onload = loadCloudData;

        const scanner = new Html5QrcodeScanner("reader", { 
            fps: 20, qrbox: { width: 250, height: 250 } 
        });

        function onScanSuccess(text) {
            if (text === lastCode) return;
            lastCode = text;
            const p = text.split(',');
            if (p.length >= 4) {
                document.getElementById('model-name').value = p[0].trim();
                document.getElementById('side-id').value = p[1].trim();
                document.getElementById('location-id').value = p[2].trim();
                document.getElementById('box-no').value = p[3].trim();
                document.getElementById('qty-input').focus();
                msg("✔ Scanned. Enter Q'ty", "#3b82f6");
            } else {
                msg("❌ Format Error", "#ef4444");
            }
        }

        function loadCloudData() {
            fetch(SCRIPT_URL)
                .then(res => res.json())
                .then(data => {
                    const body = document.getElementById('history-body');
                    body.innerHTML = data.map(h => `
                        <tr>
                            <td>${h.model}</td>
                            <td>${h.loc}</td>
                            <td>${h.box}</td>
                            <td><b>${h.qty}</b></td>
                        </tr>
                    `).join('');
                })
                .catch(() => msg("Cloud Sync Failed", "red"));
        }

        function submitData() {
            const model = document.getElementById('model-name').value;
            const side = document.getElementById('side-id').value;
            const loc = document.getElementById('location-id').value;
            const box = document.getElementById('box-no').value;
            const qty = document.getElementById('qty-input').value;

            if (!model || !qty) return alert("Missing Data!");

            msg("Sending...", "orange");
            document.getElementById('submit-btn').disabled = true;

            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ model, side, loc, box, qty })
            })
            .then(() => {
                msg("✔ Saved to Cloud!", "#10b981");
                resetForm();
                // Wait for Google Sheet to update then refresh table
                setTimeout(loadCloudData, 2000);
            })
            .catch(() => msg("❌ Error", "red"))
            .finally(() => document.getElementById('submit-btn').disabled = false);
        }

        function resetForm() {
            document.getElementById('model-name').value = "";
            document.getElementById('side-id').value = "";
            document.getElementById('location-id').value = "";
            document.getElementById('box-no').value = "";
            document.getElementById('qty-input').value = "";
            lastCode = ""; 
        }

        function msg(t, c) {
            const s = document.getElementById('status');
            s.innerText = t; s.style.color = c;
        }

        scanner.render(onScanSuccess);
    </script>
</body>
</html>
