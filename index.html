<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Production Tracker</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 450px; box-sizing: border-box; }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; background: #000; margin-bottom: 15px; min-height: 250px; }
        .hidden { display: none !important; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full { grid-column: span 2; }
        .group { display: flex; flex-direction: column; }
        label { font-size: 0.7rem; font-weight: bold; color: #64748b; margin-bottom: 4px; text-transform: uppercase; }
        input, select { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; background: #f1f5f9; color: #1e293b; outline: none; }
        
        /* Editable Fields with White Background */
        #qty-input, #process-input, #box-no, .white-bg { background: #ffffff; border: 1px solid #cbd5e1; }
        #qty-input { border: 2px solid var(--primary); }
        input[readonly] { color: #64748b; }

        .scan-btn { padding: 0 15px; border-radius: 8px; border: 1px solid #cbd5e1; background: #e2e8f0; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        .btn-submit { background: var(--primary); color: white; width: 100%; padding: 16px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .btn-submit:active { transform: scale(0.98); background: #1d4ed8; }
        
        .status { text-align: center; height: 25px; font-weight: bold; margin-bottom: 10px; font-size: 0.9rem; }
        .user-tag { font-size: 0.8rem; color: #64748b; margin-bottom: 8px; display: flex; justify-content: space-between; width: 100%; max-width: 450px; }
        
        .history { width: 100%; max-width: 450px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; font-size: 0.7rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #f1f5f9; }
        th { background: #f1f5f9; color: #64748b; }
    </style>
</head>
<body>

    <div id="setup-screen" class="card hidden">
        <h2 style="text-align:center; margin-top:0;">Operator Setup</h2>
        <select id="user-select-list" style="width:100%; margin-bottom:20px; background: white;">
            <option value="">-- Choose User --</option>
        </select>
        <button class="btn-submit" onclick="saveUser()">CONFIRM & START</button>
    </div>

    <div id="main-screen" class="hidden" style="width:100%; max-width:450px;">
        <div class="user-tag">
            <span>Operator: <b id="display-user" style="color:var(--primary)"></b></span>
            <span onclick="resetUser()" style="color:#94a3b8; cursor:pointer; text-decoration:underline;">Change User</span>
        </div>

        <div class="card">
            <div id="status" class="status">Ready</div>
            <div id="reader"></div>

            <div class="form-grid">
                
                <div class="group full">
                    <label>Box No. (Scan PCBA-)</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="box-no" placeholder="...">
                        <button type="button" class="scan-btn" onclick="resumeScanner('box-no')">📷</button>
                    </div>
                </div>

                <div class="group full">
                    <label>Process (Scan OQC)</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="process-input" placeholder="...">
                        <button type="button" class="scan-btn" onclick="resumeScanner('process-input')">📷</button>
                    </div>
                </div>

                <div class="group">
                    <label>Action</label>
                    <select id="action-type" class="white-bg">
                        <option value="Register">Register</option>
                        <option value="Confirm">Confirm</option>
                    </select>
                </div>

                <div class="group">
                    <label>Type</label>
                    <select id="io-type" class="white-bg">
                        <option value="IN">IN</option>
                        <option value="OUT">OUT</option>
                    </select>
                </div>

                <div class="group full">
                    <label>Model Name</label>
                    <input type="text" id="model-name" readonly placeholder="Waiting for scan...">
                </div>
                <div class="group">
                    <label>Side</label>
                    <input type="text" id="side-id" readonly>
                </div>
                <div class="group">
                    <label>Location</label>
                    <input type="text" id="location-id" readonly>
                </div>

                <div class="group full">
                    <label style="color: var(--primary);">Quantity (Manual Input)</label>
                    <input type="number" id="qty-input" placeholder="0">
                </div>
            </div>

            <button class="btn-submit" id="submit-btn" onclick="submitData()">SUBMIT TO RECORD</button>
        </div>

        <div class="history">
            <table id="history-table">
                <thead><tr><th>Action</th><th>Model</th><th>Q'ty</th></tr></thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // PASTE YOUR GOOGLE WEB APP URL BELOW
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwjag_tmrl6vZNkzTn41CgsJN5_sMwb8KpfYZQ9SVm_yROGPLUSWrh_DR8iXWRQhuWSUw/exec"; 

        let activeUser = localStorage.getItem('smt_op_v4');
        let localHistory = JSON.parse(localStorage.getItem('smt_hist_v4')) || [];
        let lastTarget = null;
        
        const scanner = new Html5QrcodeScanner("reader", { 
            fps: 20, qrbox: { width: 250, height: 250 } 
        });

        window.onload = function() {
            const list = document.getElementById('user-select-list');
            for(let i=1; i<=15; i++) {
                let opt = document.createElement('option');
                opt.value = "User " + i; opt.innerHTML = "User " + i;
                list.appendChild(opt);
            }
            if (!activeUser) document.getElementById('setup-screen').classList.remove('hidden');
            else showApp();
        };

        function saveUser() {
            const val = document.getElementById('user-select-list').value;
            if (!val) return alert("Please select a User ID");
            localStorage.setItem('smt_op_v4', val);
            activeUser = val;
            showApp();
        }

        function showApp() {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            document.getElementById('display-user').innerText = activeUser;
            updateTableUI();
            scanner.render(onScanSuccess);
        }

        function onScanSuccess(text) {
            scanner.pause(true); 
            const p = text.split(',');
            
            // Auto-Detect OQC for Process
            if (text.toUpperCase().includes("OQC")) {
                document.getElementById('process-input').value = text.trim();
                msg("✔ Process Updated", "#10b981");
                scanner.resume();
            }
            // Auto-Detect PCBA- for Box No
            else if (text.toUpperCase().includes("PCBA-")) {
                document.getElementById('box-no').value = text.trim();
                msg("✔ Box No Updated", "#10b981");
                scanner.resume();
            }
            // Model Data (Comma separated)
            else if (p.length >= 3) {
                document.getElementById('model-name').value = p[0].trim();
                document.getElementById('side-id').value = p[1].trim();
                document.getElementById('location-id').value = p[2].trim();
                document.getElementById('qty-input').focus();
                msg("✔ Model Scanned", "#3b82f6");
            } 
            // Manual Button Scans
            else if (lastTarget) {
                document.getElementById(lastTarget).value = text.trim();
                msg("✔ Field Updated", "#3b82f6");
            }
            else {
                msg("⚠ Scanned: " + text, "orange");
                scanner.resume();
            }
        }

        function resumeScanner(targetId) {
            lastTarget = targetId;
            msg("Scanner Active...", "orange");
            scanner.resume();
        }

        function submitData() {
            const box = document.getElementById('box-no').value;
            const process = document.getElementById('process-input').value;
            const action = document.getElementById('action-type').value;
            const type = document.getElementById('io-type').value;
            const model = document.getElementById('model-name').value;
            const side = document.getElementById('side-id').value;
            const loc = document.getElementById('location-id').value;
            const qty = document.getElementById('qty-input').value;

            if (!model || !qty) return alert("Please scan a model and enter quantity!");

            msg("Saving...", "orange");
            document.getElementById('submit-btn').disabled = true;

            localHistory.unshift({ action, model, qty });
            localStorage.setItem('smt_hist_v4', JSON.stringify(localHistory.slice(0, 5)));
            updateTableUI();

            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ user: activeUser, box, process, action, type, model, side, loc, qty })
            })
            .then(() => {
                msg("✔ Record Saved", "#10b981");
                resetForm();
                scanner.resume(); 
            })
            .catch(() => msg("❌ Network Error", "red"))
            .finally(() => document.getElementById('submit-btn').disabled = false);
        }

        function resetForm() {
            ['model-name','side-id','location-id','box-no','qty-input'].forEach(id => {
                document.getElementById(id).value = "";
            });
            lastTarget = null;
        }

        function updateTableUI() {
            const body = document.getElementById('history-body');
            body.innerHTML = localHistory.slice(0, 5).map(h => `
                <tr><td>${h.action}</td><td>${h.model}</td><td><b>${h.qty}</b></td></tr>
            `).join('');
        }

        function msg(t, c) {
            const s = document.getElementById('status');
            s.innerText = t; s.style.color = c;
        }

        function resetUser() {
            if(confirm("Change Operator ID?")) {
                localStorage.removeItem('smt_op_v4');
                location.reload();
            }
        }
    </script>
</body>
</html>
