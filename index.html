<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Tracker - Secure Login</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box; }
        .hidden { display: none !important; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; padding: 15px; border: none; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #reader { width: 100%; border-radius: 8px; margin-bottom: 15px; }
        .user-info { font-size: 0.8rem; color: #64748b; margin-bottom: 10px; display: flex; justify-content: space-between; width: 100%; max-width: 400px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; margin-top: 15px; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 8px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

    <div id="login-screen" class="card">
        <h2 style="text-align:center">Operator Login</h2>
        <input type="text" id="login-id" placeholder="User ID">
        <input type="password" id="login-pass" placeholder="Password">
        <button class="btn" onclick="handleLogin()">LOGIN</button>
        <p style="text-align:center; font-size: 0.8rem;">No account? <a href="#" onclick="toggleScreen()">Register ID</a></p>
    </div>

    <div id="register-screen" class="card hidden">
        <h2 style="text-align:center">Create Account</h2>
        <input type="text" id="reg-id" placeholder="New User ID">
        <input type="password" id="reg-pass" placeholder="New Password">
        <button class="btn" style="background: #64748b" onclick="handleRegister()">CREATE ACCOUNT</button>
        <p style="text-align:center; font-size: 0.8rem;"><a href="#" onclick="toggleScreen()">Back to Login</a></p>
    </div>

    <div id="app-screen" class="hidden" style="width: 100%; max-width: 450px;">
        <div class="user-info">
            <span>Operator: <b id="current-user"></b></span>
            <a href="#" onclick="logout()" style="color:red">Logout</a>
        </div>
        
        <div class="card">
            <div id="status" style="text-align:center; font-weight:bold; margin-bottom:5px;"></div>
            <div id="reader"></div>
            
            <label style="font-size:0.7rem; font-weight:bold">PROCESS</label>
            <select id="process-type">
                <option value="Register">Register</option>
                <option value="Confirm">Confirm</option>
            </select>

            <input type="text" id="m-name" readonly placeholder="Scan QR Code">
            <div style="display:flex; gap:10px">
                <input type="text" id="m-side" readonly placeholder="Side">
                <input type="text" id="m-loc" readonly placeholder="Loc">
            </div>
            <input type="text" id="m-box" readonly placeholder="Box No">
            <input type="number" id="m-qty" placeholder="Enter Qty" style="border: 2px solid var(--primary)">
            
            <button class="btn" id="sub-btn" onclick="submitData()">SUBMIT RECORD</button>
        </div>

        <table>
            <thead><tr><th>Type</th><th>Model</th><th>Qty</th></tr></thead>
            <tbody id="history-body"></tbody>
        </table>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzBwr1aDJYeZe0MYuGsobWflzyeYuwIAbvePo-r7499lL8a1FRS3vjxN5lg__peRkU0tA/exec";
        let currentUser = localStorage.getItem('smt_user') || null;

        if (currentUser) { showApp(); }

        const scanner = new Html5QrcodeScanner("reader", { fps: 20, qrbox: 250 });

        function toggleScreen() {
            document.getElementById('login-screen').classList.toggle('hidden');
            document.getElementById('register-screen').classList.toggle('hidden');
        }

        async function handleLogin() {
            const id = document.getElementById('login-id').value;
            const pass = document.getElementById('login-pass').value;
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "login", id, pass }) });
            const text = await res.text();
            if (text === "success") {
                currentUser = id;
                localStorage.setItem('smt_user', id);
                showApp();
            } else { alert("Invalid ID or Password"); }
        }

        async function handleRegister() {
            const id = document.getElementById('reg-id').value;
            const pass = document.getElementById('reg-pass').value;
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "registerUser", id, pass }) });
            alert("Account Created! Please Login.");
            toggleScreen();
        }

        function showApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('register-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('current-user').innerText = currentUser;
            scanner.render(onScanSuccess);
            updateTable();
        }

        function onScanSuccess(text) {
            scanner.pause(true);
            const p = text.split(',');
            if (p.length >= 4) {
                document.getElementById('m-name').value = p[0];
                document.getElementById('m-side').value = p[1];
                document.getElementById('m-loc').value = p[2];
                document.getElementById('m-box').value = p[3];
                document.getElementById('m-qty').focus();
            }
        }

        async function submitData() {
            const data = {
                action: "saveData",
                user: currentUser,
                process: document.getElementById('process-type').value,
                model: document.getElementById('m-name').value,
                side: document.getElementById('m-side').value,
                loc: document.getElementById('m-loc').value,
                box: document.getElementById('m-box').value,
                qty: document.getElementById('m-qty').value
            };

            if (!data.model || !data.qty) return alert("Fill all data");

            // Local History
            let history = JSON.parse(localStorage.getItem('smt_hist')) || [];
            history.unshift(data);
            localStorage.setItem('smt_hist', JSON.stringify(history.slice(0,10)));
            updateTable();

            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            
            document.querySelectorAll('input:not([type=password])').forEach(i => i.value = "");
            scanner.resume();
            alert("Saved by " + currentUser);
        }

        function updateTable() {
            const hist = JSON.parse(localStorage.getItem('smt_hist')) || [];
            document.getElementById('history-body').innerHTML = hist.map(h => `<tr><td>${h.process}</td><td>${h.model}</td><td>${h.qty}</td></tr>`).join('');
        }

        function logout() {
            localStorage.removeItem('smt_user');
            location.reload();
        }
    </script>
</body>
</html>
