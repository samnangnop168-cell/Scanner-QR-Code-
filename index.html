<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMT TRACKER PRO</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-green: #39ff14;
            --dark-bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.85);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 10px;
            background: #0f172a;
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Responsive Header */
        .header {
            width: 100%; max-width: 480px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; padding: 0 5px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem; letter-spacing: 1px;
            margin: 0; color: var(--neon-blue);
        }

        .user-pill {
            background: var(--glass);
            padding: 5px 10px; border-radius: 15px;
            font-size: 0.75rem; border: 1px solid var(--card-border);
        }

        /* Glass Card Container */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 15px;
            width: 100%; max-width: 480px;
            box-sizing: border-box;
        }

        #reader {
            width: 100% !important; border-radius: 12px; overflow: hidden;
            border: 1px solid var(--card-border);
            margin-bottom: 15px; background: #000;
        }

        /* Responsive Form Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .span-2 { grid-column: span 2; }

        .input-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 0.6rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; }

        input, select {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 10px; color: white;
            font-size: 0.9rem; width: 100%; box-sizing: border-box;
        }

        input:focus { border-color: var(--neon-blue); outline: none; }
        input[readonly] { color: #64748b; background: rgba(0,0,0,0.2); }

        .scan-trigger {
            background: #334155; border: none; border-radius: 10px;
            padding: 0 15px; cursor: pointer; color: white;
        }

        .submit-btn {
            background: linear-gradient(135deg, #2563eb, #00d2ff);
            color: white; border: none; border-radius: 12px;
            padding: 15px; width: 100%; font-weight: bold;
            font-size: 1rem; margin-top: 20px; cursor: pointer;
        }

        /* SCROLLABLE HISTORY TABLE */
        .history-container {
            width: 100%; max-width: 480px; margin-top: 20px;
            overflow-x: auto; /* This allows swiping left/right on phone */
            background: var(--glass);
            border-radius: 15px;
            border: 1px solid var(--card-border);
        }

        .history-table {
            width: 100%; border-collapse: collapse;
            font-size: 0.65rem; min-width: 600px; /* Forces enough width for all data */
        }

        .history-table th { 
            padding: 10px; color: #94a3b8; text-align: left; 
            background: rgba(255,255,255,0.05);
        }
        
        .history-table td { 
            padding: 10px; border-top: 1px solid var(--card-border); 
            color: #e2e8f0;
        }

        .status-bar { font-size: 0.75rem; text-align: center; margin-bottom: 10px; }
        .dot { height: 7px; width: 7px; background-color: var(--neon-green); border-radius: 50%; display: inline-block; margin-right: 5px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="setup-screen" class="glass-card hidden">
        <h2 style="text-align:center; font-family: 'Orbitron'; font-size: 1.2rem;">SYSTEM ACCESS</h2>
        <div class="input-group">
            <label>Select Operator</label>
            <select id="user-select-list"></select>
        </div>
        <button class="submit-btn" onclick="saveUser()">INITIALIZE</button>
    </div>

    <div id="main-screen" class="hidden" style="width:100%;">
        <div class="header" style="margin: 0 auto 15px auto;">
            <h1>SMT PRO</h1>
            <div class="user-pill"><span id="display-user"></span> <span onclick="resetUser()" style="color:#ef4444; margin-left:8px;">×</span></div>
        </div>

        <div class="glass-card" style="margin: 0 auto;">
            <div id="status" class="status-bar"><span class="dot"></span>System Ready</div>
            <div id="reader"></div>

            <div class="grid">
                <div class="input-group span-2">
                    <label>Box No.</label>
                    <div style="display:flex; gap:8px;">
                        <input type="text" id="box-no" placeholder="Scan PCBA-...">
                        <button class="scan-trigger" onclick="resumeScanner('box-no')">📷</button>
                    </div>
                </div>

                <div class="input-group span-2">
                    <label>Process</label>
                    <div style="display:flex; gap:8px;">
                        <input type="text" id="process-input" placeholder="Scan OQC...">
                        <button class="scan-trigger" onclick="resumeScanner('process-input')">📷</button>
                    </div>
                </div>

                <div class="input-group">
                    <label>Action</label>
                    <select id="action-type">
                        <option value="Register">Register</option>
                        <option value="Confirm">Confirm</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Type</label>
                    <select id="io-type">
                        <option value="IN">IN</option>
                        <option value="OUT">OUT</option>
                    </select>
                </div>

                <div class="input-group span-2">
                    <label>Model</label>
                    <input type="text" id="model-name" readonly>
                </div>

                <div class="input-group">
                    <label>Side</label>
                    <input type="text" id="side-id" readonly>
                </div>

                <div class="input-group">
                    <label>Location</label>
                    <input type="text" id="location-id" readonly>
                </div>

                <div class="input-group span-2">
                    <label style="color:var(--neon-blue)">Quantity</label>
                    <input type="number" id="qty-input" placeholder="0">
                </div>
            </div>

            <button class="submit-btn" id="submit-btn" onclick="submitData()">SUBMIT RECORD</button>
        </div>

        <div class="history-container" style="margin: 20px auto;">
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Box No</th>
                        <th>Process</th>
                        <th>Action</th>
                        <th>I/O</th>
                        <th>Model</th>
                        <th>Qty</th>
                    </tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgiVeUtAe-mBpToqPmxobdd3wNmzKezTdo5qOvX_Cnix2OaLjuV39B8ZHtv5mcB65HIg/exec"; 

        let activeUser = localStorage.getItem('smt_op_v4');
        let localHistory = JSON.parse(localStorage.getItem('smt_hist_v4')) || [];
        let lastTarget = null;
        
        const scanner = new Html5QrcodeScanner("reader", { fps: 20, qrbox: { width: 250, height: 250 } });

        window.onload = function() {
            const list = document.getElementById('user-select-list');
            for(let i=1; i<=15; i++) {
                let opt = document.createElement('option');
                opt.value = "User " + i; opt.innerHTML = "USER " + i;
                list.appendChild(opt);
            }
            if (!activeUser) document.getElementById('setup-screen').classList.remove('hidden');
            else showApp();
        };

        function saveUser() {
            const val = document.getElementById('user-select-list').value;
            if (!val) return;
            localStorage.setItem('smt_op_v4', val);
            activeUser = val;
            showApp();
        }

        function showApp() {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            document.getElementById('display-user').innerText = activeUser;
            updateTableUI();
            scanner.render(onScanSuccess);
        }

        function onScanSuccess(text) {
            scanner.pause(true); 
            const p = text.split(',');
            if (text.toUpperCase().includes("OQC")) {
                document.getElementById('process-input').value = text.trim();
                msg("✔ PROCESS OK", "#39ff14"); scanner.resume();
            } else if (text.toUpperCase().includes("PCBA-")) {
                document.getElementById('box-no').value = text.trim();
                msg("✔ BOX OK", "#39ff14"); scanner.resume();
            } else if (p.length >= 3) {
                document.getElementById('model-name').value = p[0].trim();
                document.getElementById('side-id').value = p[1].trim();
                document.getElementById('location-id').value = p[2].trim();
                document.getElementById('qty-input').focus();
                msg("✔ MODEL OK", "#00d2ff");
            } else if (lastTarget) {
                document.getElementById(lastTarget).value = text.trim();
                msg("✔ UPDATED", "#00d2ff");
            } else {
                msg("⚠ UNKNOWN", "orange"); scanner.resume();
            }
        }

        function resumeScanner(targetId) {
            lastTarget = targetId;
            msg("SCANNING...", "#00d2ff");
            scanner.resume();
        }

        function submitData() {
            const box = document.getElementById('box-no').value;
            const process = document.getElementById('process-input').value;
            const action = document.getElementById('action-type').value;
            const type = document.getElementById('io-type').value;
            const model = document.getElementById('model-name').value;
            const side = document.getElementById('side-id').value;
            const loc = document.getElementById('location-id').value;
            const qty = document.getElementById('qty-input').value;

            if (!model || !qty) return alert("Scan model and enter quantity!");

            msg("SENDING...", "#00d2ff");
            document.getElementById('submit-btn').disabled = true;

            // Push ALL data to history
            localHistory.unshift({ box, process, action, type, model, qty });
            localStorage.setItem('smt_hist_v4', JSON.stringify(localHistory.slice(0, 10)));
            updateTableUI();

            fetch(SCRIPT_URL, {
                method: "POST", mode: "no-cors",
                body: JSON.stringify({ user: activeUser, box, process, action, type, model, side, loc, qty })
            })
            .then(() => {
                msg("✔ SAVED", "#39ff14");
                resetForm(); scanner.resume(); 
            })
            .catch(() => msg("❌ ERROR", "#ef4444"))
            .finally(() => document.getElementById('submit-btn').disabled = false);
        }

        function resetForm() {
            ['model-name','side-id','location-id','box-no','qty-input'].forEach(id => {
                document.getElementById(id).value = "";
            });
            lastTarget = null;
        }

        function updateTableUI() {
            const body = document.getElementById('history-body');
            body.innerHTML = localHistory.slice(0, 10).map(h => `
                <tr>
                    <td>${h.box || '-'}</td>
                    <td>${h.process || '-'}</td>
                    <td>${h.action}</td>
                    <td>${h.type}</td>
                    <td>${h.model}</td>
                    <td style="color:var(--neon-blue); font-weight:bold;">${h.qty}</td>
                </tr>
            `).join('');
        }

        function msg(t, c) {
            const s = document.getElementById('status');
            s.innerHTML = `<span class="dot" style="background:${c}"></span>${t}`;
            s.style.color = c;
        }

        function resetUser() {
            if(confirm("Logout?")) {
                localStorage.removeItem('smt_op_v4');
                location.reload();
            }
        }
    </script>
</body>
</html>
